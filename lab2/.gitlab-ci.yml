stages:
  - lint
  - prepare-dataset
  - train
  - test

default:
  image: python:3.12-slim
  before_script:
    - pip install --quiet -r requirements.txt

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: pip-$CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip

lint:
  stage: lint
  before_script:
    - pip install --quiet pyyaml
  script:
    - python ci_lint.py .gitlab-ci.yml

prepare-dataset:
  stage: prepare-dataset
  script:
    - python data_collection.py
    - python data_preprocessing.py
  artifacts:
    paths:
      - data/
    expire_in: 1 week

train:
  stage: train
  needs:
    - prepare-dataset
  script:
    - python model_training.py
  artifacts:
    paths:
      - models/
    expire_in: 1 week

test:
  stage: test
  needs:
    - prepare-dataset
    - train
  script:
    - python model_testing.py
  artifacts:
    paths:
      - logs/
    expire_in: 1 week
